name: Daily rebuild — Fetch news & reform data

on:
  # Runs every day at 07:00 UTC (04:00 BRT)
  schedule:
    - cron: "0 7 * * *"

  # Allow manual trigger
  workflow_dispatch:

jobs:
  trigger-rebuild:
    name: Trigger Cloudflare Pages rebuild
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Cloudflare Pages deploy hook
        run: |
          # Set CF_DEPLOY_HOOK secret in GitHub repo settings:
          # Settings > Secrets > Actions > New repository secret
          # Value: your Cloudflare Pages deploy hook URL
          # (Pages > your project > Settings > Builds & deployments > Deploy hooks)
          curl -X POST "${{ secrets.CF_DEPLOY_HOOK }}"

      - name: Log success
        run: echo "✅ Rebuild triggered at $(date -u)"

# ─── Alternative: Netlify deploy hook ─────────────────────────────────────────
# Replace the curl step above with:
#   curl -X POST "${{ secrets.NETLIFY_DEPLOY_HOOK }}"
#
# ─── Alternative: Vercel deploy hook ──────────────────────────────────────────
# Replace with:
#   curl -X POST "https://api.vercel.com/v1/integrations/deploy/${{ secrets.VERCEL_DEPLOY_HOOK }}"
